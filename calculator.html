<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart UI Calculator | Sudeep  Singh</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root { --bg: #0f172a; --card: #1e293b; --primary: #38bdf8; --text: #f8fafc; }
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
    body { background: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; height: 100vh; }
    .calc-container { background: var(--card); padding: 30px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.5); width: 350px; border: 1px solid rgba(255,255,255,0.05); }
    .screen { width: 100%; height: 70px; background: #0f172a; border: none; border-radius: 10px; margin-bottom: 20px; text-align: right; padding: 20px; font-size: 2rem; color: var(--primary); font-weight: 600; }
    .buttons-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; }
    button { padding: 20px; font-size: 1.2rem; font-weight: 600; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); border-radius: 10px; color: var(--text); cursor: pointer; transition: 0.2s; }
    button:hover { background: rgba(56, 189, 248, 0.1); border-color: var(--primary); transform: scale(1.05); }
    .btn-op { color: var(--primary); }
    .btn-clear { color: #ef4444; }
    .btn-equal { background: linear-gradient(45deg, var(--primary), #818cf8); color: white; grid-column: span 2; }
    .back-btn { display: block; text-align: center; margin-top: 20px; color: #94a3b8; text-decoration: none; font-size: 0.9rem; }
    .back-btn:hover { color: var(--primary); }
  </style>
</head>
<body>
  <div class="calc-container">
    <h3 style="margin-bottom: 15px; text-align: center; color: #94a3b8;"><i class="fas fa-calculator"></i> Smart Calculator</h3>
    <input type="text" id="screen" class="screen" readonly placeholder="0">
    <div class="buttons-grid">
      <button class="btn-clear" onclick="clearScreen()">C</button>
      <button class="btn-op" onclick="press('/')">/</button>
      <button class="btn-op" onclick="press('*')">*</button>
      <button class="btn-op" onclick="press('-')">-</button>
      <button onclick="press('7')">7</button><button onclick="press('8')">8</button><button onclick="press('9')">9</button>
      <button class="btn-op" onclick="press('+')">+</button>
      <button onclick="press('4')">4</button><button onclick="press('5')">5</button><button onclick="press('6')">6</button>
      <button onclick="press('.')">.</button>
      <button onclick="press('1')">1</button><button onclick="press('2')">2</button><button onclick="press('3')">3</button>
      <button onclick="press('0')">0</button>
      <button class="btn-equal" onclick="calculate()">=</button>
    </div>
    <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> Back to Portfolio</a>
  </div>
  <script>
    let scr = document.getElementById('screen');
    function press(val) { scr.value += val; }
    function clearScreen() { scr.value = ''; }
    function calculate() { try { scr.value = eval(scr.value); } catch(err) { scr.value = 'Error'; } }
  </script>
</body>
</html>
