<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Slides</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

background:#020617;
font-family:Arial;
overflow:hidden;
height:100vh;
color:white;

}

.slider{

display:flex;
width:400%;
height:100vh;
animation:slide 20s infinite;

}

.slide{

width:100vw;
height:100vh;
flex-shrink:0;

display:flex;
justify-content:center;
align-items:center;
flex-direction:column;

padding:40px;
text-align:center;

}

.slide:nth-child(1){

background:linear-gradient(135deg,#0f172a,#1e293b);

}

.slide:nth-child(2){

background:linear-gradient(135deg,#111827,#1e3a8a);

}

.slide:nth-child(3){

background:linear-gradient(135deg,#172554,#312e81);

}

.slide:nth-child(4){

background:linear-gradient(135deg,#0f172a,#111827);

}

h1{

font-size:60px;
margin-bottom:20px;

}

p{

font-size:24px;
max-width:800px;
line-height:1.7;

}

@keyframes slide{

0%{
transform:translateX(0);
}

20%{
transform:translateX(0);
}

25%{
transform:translateX(-100vw);
}

45%{
transform:translateX(-100vw);
}

50%{
transform:translateX(-200vw);
}

70%{
transform:translateX(-200vw);
}

75%{
transform:translateX(-300vw);
}

95%{
transform:translateX(-300vw);
}

100%{
transform:translateX(0);
}

}

</style>

</head>

<body>

<div class="slider">

<div class="slide">

<h1>CSJMU Kanpur</h1>

<p>
B.Sc Computer Science Academic Roadmap
</p>

</div>

<div class="slide">

<h1>Semester 1 & 2</h1>

<p>
Python Programming, DBMS, Computer Fundamentals,
Problem Solving Techniques
</p>

</div>

<div class="slide">

<h1>Semester 3 & 4</h1>

<p>
Data Structures, Operating System,
C Programming, System Architecture
</p>

</div>

<div class="slide">

<h1>Thank You 🚀</h1>

<p>
Sudeep Thakur <br><br>

GitHub :
github.com/sudeepsingh-ss
</p>

</div>

</div>

</body>

</html>
