<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management System</title>
    <style>
        :root { --bg: #020617; --primary: #38bdf8; --text: #f8fafc; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; padding: 40px; display: flex; flex-direction: column; align-items: center; }
        .box { background: rgba(15, 23, 42, 0.9); padding: 30px; border-radius: 20px; width: 100%; max-width: 500px; border: 1px solid #334155; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #0f172a; border: 1px solid #334155; color: white; border-radius: 8px; }
        button { width: 100%; padding: 12px; background: var(--primary); border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        table { width: 100%; margin-top: 20px; border-collapse: collapse; }
        th, td { border: 1px solid #334155; padding: 10px; text-align: center; }
    </style>
</head>
<body>

<div class="box">
    <h2>Add Student Record</h2>
    <input type="text" id="name" placeholder="Student Name">
    <input type="text" id="roll" placeholder="Roll Number">
    <button onclick="addStudent()">Add Student</button>
</div>

<table id="studentTable">
    <thead><tr><th>Name</th><th>Roll No</th></tr></thead>
    <tbody></tbody>
</table>

<script>
    function addStudent() {
        const name = document.getElementById('name').value;
        const roll = document.getElementById('roll').value;
        if(!name || !roll) return alert("Please fill details!");
        
        const tbody = document.querySelector('tbody');
        tbody.innerHTML += `<tr><td>${name}</td><td>${roll}</td></tr>`;
        
        // Clear inputs
        document.getElementById('name').value = '';
        document.getElementById('roll').value = '';
    }
</script>

</body>
</html>
